<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KARTEL | CALENDAR</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #070b14; --bg2: #0c1120; --bg3: #111827; --card: #0d1526; --card-hover: #131d30;
    --accent: #00ff88; --accent2: #00d4ff; --text: #e2eeff; --text2: #7a9bb5; --text3: #4a6a85;
    --border: rgba(0,255,136,0.15); --at-risk: #f59e0b; --overdue: #ef4444;
    --complete: #3a5a73; --awaiting: #818cf8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'JetBrains Mono', monospace; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 12px; }

  /* ─── TOP NAV ─────────────────────────────────────────────── */
  .top-nav { background: var(--bg2); border-bottom: 1px solid rgba(129,140,248,0.15); display: flex; align-items: center; padding: 0 20px; gap: 2px; position: sticky; top: 0; z-index: 200; height: 36px; }
  .nav-brand { font-size: 10px; font-weight: 700; color: var(--accent); letter-spacing: .12em; margin-right: 12px; white-space: nowrap; }
  .nav-btn { background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; font-family: inherit; font-size: 10px; font-weight: 700; letter-spacing: .08em; color: var(--text3); padding: 0 14px; height: 36px; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; transition: color .15s; white-space: nowrap; }
  .nav-btn:hover { color: var(--text2); }
  .nav-btn.active { color: var(--accent2); border-bottom-color: var(--accent2); }
  .nav-divider { width: 1px; height: 16px; background: rgba(255,255,255,.06); margin: 0 4px; }

  /* ─── HEADER ───────────────────────────────────────────────── */
  .header { background: linear-gradient(180deg,#0a1020 0%,var(--bg2) 100%); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; gap: 16px; }
  .brand-title { font-size: 13px; font-weight: 700; color: var(--accent2); letter-spacing: .12em; }
  .brand-sub { font-size: 10px; color: var(--text2); margin-top: 2px; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .refresh-btn { font-family: inherit; font-size: 10px; color: var(--text3); background: none; border: 1px solid rgba(255,255,255,.08); padding: 5px 12px; border-radius: 4px; cursor: pointer; }
  .refresh-btn:hover { color: var(--text2); }
  .cache-label { font-size: 9px; color: var(--text3); }

  /* ─── MONTH NAV ─────────────────────────────────────────────── */
  .month-nav { background: var(--bg2); border-bottom: 1px solid rgba(255,255,255,.04); padding: 10px 24px; display: flex; align-items: center; gap: 16px; }
  .month-title { font-size: 14px; font-weight: 700; letter-spacing: .1em; color: var(--text); min-width: 200px; }
  .nav-arrow { font-family: inherit; font-size: 14px; font-weight: 700; color: var(--text3); background: none; border: 1px solid rgba(255,255,255,.08); border-radius: 4px; width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color .15s; }
  .nav-arrow:hover { color: var(--text); border-color: rgba(255,255,255,.2); }
  .today-btn { font-family: inherit; font-size: 9px; font-weight: 700; letter-spacing: .08em; color: var(--accent); background: rgba(0,255,136,.08); border: 1px solid rgba(0,255,136,.2); border-radius: 4px; padding: 4px 12px; cursor: pointer; }
  .today-btn:hover { background: rgba(0,255,136,.14); }
  .month-nav-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

  /* ─── LEGEND ─────────────────────────────────────────────────── */
  .legend { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 9px; color: var(--text3); }
  .leg-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  /* ─── CALENDAR GRID ──────────────────────────────────────────── */
  .cal-wrap { padding: 0 20px 24px; overflow-x: auto; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, minmax(120px, 1fr)); border-left: 1px solid rgba(255,255,255,.06); border-top: 1px solid rgba(255,255,255,.06); min-width: 840px; }

  /* day-of-week headers */
  .dow-header { background: var(--bg2); padding: 7px 10px; font-size: 9px; font-weight: 700; letter-spacing: .12em; color: var(--text3); text-align: center; border-right: 1px solid rgba(255,255,255,.06); border-bottom: 1px solid rgba(255,255,255,.06); text-transform: uppercase; }
  .dow-header.weekend { color: rgba(74,106,133,.6); }

  /* day cells */
  .day-cell { background: var(--bg); border-right: 1px solid rgba(255,255,255,.06); border-bottom: 1px solid rgba(255,255,255,.06); padding: 8px 8px 10px; min-height: 110px; vertical-align: top; position: relative; transition: background .12s; }
  .day-cell:hover { background: #090e1b; }
  .day-cell.other-month { background: #060910; }
  .day-cell.other-month .day-num { color: rgba(74,106,133,.35); }
  .day-cell.weekend { background: #07091a; }
  .day-cell.today { background: #081420 !important; outline: 2px solid var(--accent); outline-offset: -2px; }
  .day-cell.has-overdue { background: rgba(239,68,68,.04); }

  .day-num { font-size: 11px; font-weight: 700; color: var(--text2); margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
  .today-badge { font-size: 8px; font-weight: 700; letter-spacing: .08em; color: var(--accent); background: rgba(0,255,136,.12); border: 1px solid rgba(0,255,136,.3); border-radius: 3px; padding: 1px 5px; }
  .day-cell.today .day-num { color: var(--accent); }

  /* milestone chips inside cells */
  .ms-chip { border-radius: 3px; padding: 3px 6px; margin-bottom: 3px; font-size: 9px; font-weight: 600; line-height: 1.3; cursor: pointer; overflow: hidden; display: block; transition: opacity .12s; border-left: 2px solid transparent; }
  .ms-chip-phase { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ms-chip-project { font-size: 8px; font-weight: 400; opacity: .7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .ms-chip:hover { opacity: .85; }
  .ms-chip.c-complete   { background: rgba(58,90,115,.18); color: var(--complete); border-left-color: var(--complete); }
  .ms-chip.c-inprogress { background: rgba(0,255,136,.1);  color: var(--accent);   border-left-color: var(--accent); }
  .ms-chip.c-notstarted { background: rgba(122,155,181,.08); color: var(--text3); border-left-color: var(--text3); }
  .ms-chip.c-awaiting   { background: rgba(129,140,248,.1); color: var(--awaiting); border-left-color: var(--awaiting); }
  .ms-chip.c-overdue    { background: rgba(239,68,68,.12); color: var(--overdue);  border-left-color: var(--overdue); }
  .ms-chip.c-atrisk     { background: rgba(245,158,11,.1); color: var(--at-risk);  border-left-color: var(--at-risk); }

  .overflow-chip { font-size: 8px; color: var(--text3); padding: 2px 4px; cursor: pointer; }
  .overflow-chip:hover { color: var(--text2); }

  /* ─── DETAIL PANEL ────────────────────────────────────────────── */
  .detail-overlay { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,.55); }
  .detail-panel { position: fixed; top: 0; right: 0; bottom: 0; width: 360px; background: var(--bg2); border-left: 1px solid rgba(255,255,255,.1); z-index: 301; overflow-y: auto; padding: 0; box-shadow: -8px 0 32px rgba(0,0,0,.4); }
  .detail-header { padding: 16px 18px 12px; border-bottom: 1px solid rgba(255,255,255,.07); display: flex; align-items: flex-start; gap: 10px; position: sticky; top: 0; background: var(--bg2); z-index: 1; }
  .detail-date { flex: 1; }
  .detail-date-main { font-size: 13px; font-weight: 700; color: var(--text); }
  .detail-date-sub  { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .detail-close { font-family: inherit; font-size: 16px; color: var(--text3); background: none; border: none; cursor: pointer; padding: 0 4px; line-height: 1; }
  .detail-close:hover { color: var(--text); }
  .detail-body { padding: 14px 18px; }
  .detail-ms { background: var(--card); border: 1px solid rgba(255,255,255,.07); border-radius: 6px; padding: 12px 14px; margin-bottom: 10px; border-left: 3px solid var(--text3); }
  .detail-ms.c-complete   { border-left-color: var(--complete); }
  .detail-ms.c-inprogress { border-left-color: var(--accent); }
  .detail-ms.c-notstarted { border-left-color: var(--text3); }
  .detail-ms.c-awaiting   { border-left-color: var(--awaiting); }
  .detail-ms.c-overdue    { border-left-color: var(--overdue); }
  .detail-ms.c-atrisk     { border-left-color: var(--at-risk); }
  .dm-phase   { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .dm-project { font-size: 10px; color: var(--text2); margin-bottom: 6px; }
  .dm-row { display: flex; align-items: center; justify-content: space-between; }
  .dm-job  { font-size: 9px; color: var(--text3); background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.07); border-radius: 3px; padding: 2px 6px; }
  .dm-badge { font-size: 8px; font-weight: 700; letter-spacing: .08em; border-radius: 3px; padding: 2px 6px; text-transform: uppercase; }
  .badge-complete   { color: var(--complete);  background: rgba(58,90,115,.2);    border: 1px solid rgba(58,90,115,.35); }
  .badge-inprogress { color: var(--accent);    background: rgba(0,255,136,.08);   border: 1px solid rgba(0,255,136,.2); }
  .badge-notstarted { color: var(--text3);     background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); }
  .badge-awaiting   { color: var(--awaiting);  background: rgba(129,140,248,.08); border: 1px solid rgba(129,140,248,.2); }
  .badge-overdue    { color: var(--overdue);   background: rgba(239,68,68,.08);   border: 1px solid rgba(239,68,68,.2); }
  .badge-atrisk     { color: var(--at-risk);   background: rgba(245,158,11,.08);  border: 1px solid rgba(245,158,11,.2); }

  /* ─── misc ──── */
  .loading-msg { padding: 60px 24px; color: var(--text3); font-size: 11px; text-align: center; }
  .error-msg   { padding: 40px 24px; color: var(--overdue); font-size: 11px; }
</style>
</head>
<body>

<!-- ── TOP NAV ── -->
<div class="top-nav">
  <span class="nav-brand">🟢 KLAW</span>
  <div class="nav-divider"></div>
  <a class="nav-btn" href="/">📋 BOARD</a>
  <div style="flex:1"></div>
  <a class="nav-btn" href="/overview-mockup.html">🗂 OVERVIEW</a>
  <a class="nav-btn" href="/capacity-mockup.html">👥 ARTISTS</a>
  <a class="nav-btn active" href="/calendar.html">📅 CALENDAR</a>
</div>

<!-- ── HEADER ── -->
<div class="header">
  <div>
    <div class="brand-title">📅 PRODUCTION CALENDAR</div>
    <div class="brand-sub" id="brand-sub">Loading milestones...</div>
  </div>
  <div class="header-right">
    <span class="cache-label" id="cache-label"></span>
    <button class="refresh-btn" onclick="loadCalendar(true)">↺ Refresh</button>
  </div>
</div>

<!-- ── MONTH NAV ── -->
<div class="month-nav">
  <button class="nav-arrow" onclick="shiftMonth(-1)">‹</button>
  <div class="month-title" id="month-title">—</div>
  <button class="nav-arrow" onclick="shiftMonth(1)">›</button>
  <button class="today-btn" onclick="goToday()">TODAY</button>
  <div class="month-nav-right">
    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:var(--overdue)"></div>Overdue</div>
      <div class="leg"><div class="leg-dot" style="background:var(--accent)"></div>In Progress</div>
      <div class="leg"><div class="leg-dot" style="background:var(--at-risk)"></div>At Risk</div>
      <div class="leg"><div class="leg-dot" style="background:var(--awaiting)"></div>Awaiting Client</div>
      <div class="leg"><div class="leg-dot" style="background:var(--text3)"></div>Not Started</div>
      <div class="leg"><div class="leg-dot" style="background:var(--complete)"></div>Complete</div>
    </div>
  </div>
</div>

<div id="cal-container">
  <div class="loading-msg">⟳ Loading milestones from AirTable...</div>
</div>

<!-- ── DETAIL PANEL ── -->
<div class="detail-overlay" id="overlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detail-panel" style="display:none">
  <div class="detail-header">
    <div class="detail-date">
      <div class="detail-date-main" id="detail-date-main">—</div>
      <div class="detail-date-sub"  id="detail-date-sub">—</div>
    </div>
    <button class="detail-close" onclick="closeDetail()">✕</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<script>
let allMilestones = [];
let viewYear, viewMonth; // 0-indexed month

const DAYS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function todayLocal() {
  const d = new Date(); return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}
function parseDate(str) {
  if (!str) return null;
  const [y,m,d] = str.split('-').map(Number);
  return new Date(y, m-1, d);
}

function resolveStatus(ms) {
  if (ms.status === 'Complete') return 'complete';
  if (ms.status === 'Awaiting Client') return 'awaiting';
  if (ms.dueDate) {
    const d = parseDate(ms.dueDate), t = todayLocal();
    if (d < t) return 'overdue';
    const diff = Math.round((d - t) / 86400000);
    if (diff <= 1) return 'atrisk';
  }
  if (ms.status === 'In Progress') return 'inprogress';
  return 'notstarted';
}

const STATUS_LABEL = { complete:'Complete', inprogress:'In Progress', notstarted:'Not Started', awaiting:'Awaiting Client', overdue:'Overdue', atrisk:'At Risk' };
const STATUS_ORDER = { overdue:0, atrisk:1, inprogress:2, awaiting:3, notstarted:4, complete:5 };

function buildMsByDate() {
  const map = {};
  allMilestones.forEach(ms => {
    if (!ms.dueDate) return;
    const key = ms.dueDate; // 'YYYY-MM-DD'
    if (!map[key]) map[key] = [];
    map[key].push({ ...ms, _status: resolveStatus(ms) });
  });
  // Sort each day's milestones by status priority
  Object.values(map).forEach(arr => arr.sort((a,b) => STATUS_ORDER[a._status] - STATUS_ORDER[b._status]));
  return map;
}

function renderCalendar() {
  const container = document.getElementById('cal-container');
  const byDate = buildMsByDate();
  const today  = todayLocal();

  document.getElementById('month-title').textContent = `${MONTHS[viewMonth]} ${viewYear}`;

  // First day of month, last day
  const firstDay = new Date(viewYear, viewMonth, 1);
  const lastDay  = new Date(viewYear, viewMonth + 1, 0);
  const startDow = firstDay.getDay(); // 0=Sun

  let html = '<div class="cal-wrap"><div class="cal-grid">';

  // Day-of-week headers
  DAYS.forEach((d,i) => {
    const wknd = (i===0||i===6) ? ' weekend' : '';
    html += `<div class="dow-header${wknd}">${d}</div>`;
  });

  // Leading blank cells
  for (let i = 0; i < startDow; i++) {
    const date = new Date(viewYear, viewMonth, 1 - (startDow - i));
    html += dayCell(date, byDate, today, true);
  }

  // Days of the month
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const date = new Date(viewYear, viewMonth, d);
    html += dayCell(date, byDate, today, false);
  }

  // Trailing blank cells to complete the last row
  const totalCells = startDow + lastDay.getDate();
  const trailing = (7 - (totalCells % 7)) % 7;
  for (let i = 1; i <= trailing; i++) {
    const date = new Date(viewYear, viewMonth + 1, i);
    html += dayCell(date, byDate, today, true);
  }

  html += '</div></div>';
  container.innerHTML = html;
}

function dateKey(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,'0');
  const d = String(date.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

function dayCell(date, byDate, today, otherMonth) {
  const key   = dateKey(date);
  const items = byDate[key] || [];
  const isToday   = date.getTime() === today.getTime();
  const isWeekend = date.getDay()===0 || date.getDay()===6;
  const hasOverdue = items.some(m => m._status==='overdue');

  let cls = 'day-cell';
  if (otherMonth) cls += ' other-month';
  else if (isWeekend) cls += ' weekend';
  if (isToday)   cls += ' today';
  if (hasOverdue && !otherMonth) cls += ' has-overdue';

  const dateArg = JSON.stringify(key);
  let inner = `<div class="day-num">${date.getDate()}${isToday ? '<span class="today-badge">TODAY</span>' : ''}</div>`;

  const MAX_CHIPS = 3;
  const visible = items.slice(0, MAX_CHIPS);
  const overflow = items.length - MAX_CHIPS;

  visible.forEach(ms => {
    const phase   = ms.phase || ms.name || 'Milestone';
    const project = ms.projectName || '';
    inner += `<span class="ms-chip c-${ms._status}" onclick="openDetail(event,${dateArg})" title="${project} — ${phase}">
      ${project ? `<div class="ms-chip-phase">${project}</div>` : ''}
      <div class="ms-chip-project">${phase}</div>
    </span>`;
  });

  if (overflow > 0) {
    inner += `<span class="overflow-chip" onclick="openDetail(event,${dateArg})">+${overflow} more</span>`;
  }

  return `<div class="${cls}">${inner}</div>`;
}

function openDetail(e, dateStr) {
  e.stopPropagation();
  const byDate = buildMsByDate();
  const items  = byDate[dateStr] || [];
  const date   = parseDate(dateStr);
  const today  = todayLocal();
  const isToday = date.getTime() === today.getTime();

  const opts = { weekday:'long', month:'long', day:'numeric', year:'numeric' };
  document.getElementById('detail-date-main').textContent = date.toLocaleDateString('en-US', opts);
  document.getElementById('detail-date-sub').textContent  = `${items.length} milestone${items.length!==1?'s':''} due${isToday?' · TODAY':''}`;

  let html = '';
  if (!items.length) {
    html = '<div style="font-size:10px;color:var(--text3);padding:8px 0">No milestones due this day.</div>';
  } else {
    items.forEach(ms => {
      const s = ms._status;
      html += `<div class="detail-ms c-${s}">
        <div class="dm-phase">${ms.phase || ms.name || 'Milestone'}</div>
        <div class="dm-project">${ms.projectName || '—'}</div>
        <div class="dm-row">
          ${ms.projectJob ? `<span class="dm-job">${ms.projectJob}</span>` : '<span></span>'}
          <span class="dm-badge badge-${s}">${STATUS_LABEL[s]||s}</span>
        </div>
      </div>`;
    });
  }

  document.getElementById('detail-body').innerHTML = html;
  document.getElementById('overlay').style.display = 'block';
  document.getElementById('detail-panel').style.display = 'block';
}

function closeDetail() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('detail-panel').style.display = 'none';
}

function shiftMonth(delta) {
  viewMonth += delta;
  if (viewMonth > 11) { viewMonth = 0;  viewYear++; }
  if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
  renderCalendar();
}

function goToday() {
  const t = todayLocal();
  viewYear  = t.getFullYear();
  viewMonth = t.getMonth();
  renderCalendar();
}

async function loadCalendar(force) {
  try {
    const url = force ? '/api/milestones?bust=' + Date.now() : '/api/milestones';
    const res  = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    allMilestones = data.milestones || [];

    const total   = allMilestones.length;
    const active  = allMilestones.filter(m => m.status !== 'Complete').length;
    const overdue = allMilestones.filter(m => resolveStatus(m) === 'overdue').length;
    document.getElementById('brand-sub').textContent  = `${total} milestones · ${active} active · ${overdue} overdue · AirTable`;
    document.getElementById('cache-label').textContent = data.cacheAge != null ? `cache ${data.cacheAge}s old` : '';

    renderCalendar();
  } catch(e) {
    document.getElementById('cal-container').innerHTML =
      `<div class="error-msg">⚠ Failed to load milestones: ${e.message}</div>`;
  }
}

// Init
const _t = todayLocal();
viewYear  = _t.getFullYear();
viewMonth = _t.getMonth();

loadCalendar();
setInterval(() => loadCalendar(false), 2 * 60 * 1000);

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });
</script>
</body>
</html>
